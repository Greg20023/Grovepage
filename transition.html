const canvas = document.getElementById('c');

const overlay = document.getElementById('overlay');

const GRID_COLS = 22;

function resize() {
  // Canvas en pixels physiques (Retina-aware)
  const dpr = window.devicePixelRatio || 1;
  W = Math.round(window.innerWidth * dpr);
  H = Math.round(window.innerHeight * dpr);
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  // Pas d'interpolation — on veut du pixel-perfect
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
}

window.addEventListener('resize', () => { resize(); if (!animating) drawStatic(); });

function getImgTransform() {
  const iw = img.naturalWidth, ih = img.naturalHeight;
  // On veut couvrir tout l'écran sans déformer
  const scale = Math.max(W / iw, H / ih);
  const dw = iw * scale, dh = ih * scale;
  const ox = (W - dw) / 2, oy = (H - dh) / 2;
  return { scale, dw, dh, ox, oy };
}

  const { scale, ox, oy } = getImgTransform();

  for (let row = 0; row < GRID_ROWS; row++) {
    for (let col = 0; col < GRID_COLS; col++) {
      const x = col * cw, y = row * ch;
      const cx = x + cw/2, cy = y + ch/2;
      const dx = cx - W/2, dy = cy - H/2;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const power = 5 + Math.random()*9 + dist*0.012;
      const vx = (dx/dist)*power + (Math.random()-0.5)*power*0.5;
      const vy = (dy/dist)*power + (Math.random()-0.5)*power*0.5;
      const va = (Math.random()-0.5)*0.22;
      const stagger = (dist / (Math.max(W,H)*0.75)) * 0.35;
      frags.push({
        x, y, w: cw+1, h: ch+1, cx, cy,
        vx, vy, va, stagger,
        sx: (x - ox) / scale,
        sy: (y - oy) / scale,
        sw: cw / scale, sh: ch / scale,
        px: 0, py: 0, angle: 0, opacity: 1
      });
    }
  }
}

function drawStatic() {
  const { ox, oy, dw, dh } = getImgTransform();
  ctx.clearRect(0,0,W,H);
  ctx.drawImage(img, ox, oy, dw, dh);
}

function drawFrag(f, progress) {
  const localP = Math.max(0, (progress - f.stagger) / (1 - f.stagger));
  const ease = 1 - Math.pow(1 - localP, 2.8);
  const px = f.vx * ease * EXPLODE_DURATION * 0.052;
  const py = f.vy * ease * EXPLODE_DURATION * 0.052;
  const angle = f.va * ease * EXPLODE_DURATION * 0.052;
  const opacity = Math.max(0, 1 - Math.pow(Math.max(0, (progress-0.25)/0.75), 1.8));

  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.translate(f.cx + px, f.cy + py);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.rect(-f.w/2, -f.h/2, f.w, f.h);
  ctx.clip();
  ctx.drawImage(img,
    Math.max(0, f.sx), Math.max(0, f.sy),
    Math.max(1, f.sw), Math.max(1, f.sh),
    -f.w/2, -f.h/2, f.w, f.h
  );
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 0.6;
  ctx.strokeRect(-f.w/2, -f.h/2, f.w, f.h);
  ctx.restore();
}

function animate(now) {
  if (!startTime) startTime = now;
  const progress = Math.min((now - startTime) / EXPLODE_DURATION, 1);
  ctx.clearRect(0,0,W,H);
  frags.forEach(f => drawFrag(f, progress));
  if (progress > 0.45) {
    groveContent.style.opacity = Math.min(1, (progress-0.45)/0.55).toString();
  }
  if (progress < 1) {
    requestAnimationFrame(animate);
  } else {
    overlay.style.display = 'none';
    groveContent.style.opacity = '1';
  }
}

const img = new Image();
img.onload = function() {
  drawStatic();
  buildFragments();
  setTimeout(() => {
    animating = true;
    requestAnimationFrame(animate);
  }, 900);
};
img.src = IMG_SRC;
</script>
