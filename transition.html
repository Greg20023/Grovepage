const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const groveContent = document.getElementById('grove-content');

let W, H;
let img = new Image();
let frags = [];
let animating = false;
let startTime = null;
const GRID_COLS = 20;
const GRID_ROWS = 15;
const EXPLODE_DURATION = 1200;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

window.addEventListener('resize', () => { resize(); if (!animating) drawStatic(); });
resize();

function buildFragments() {
  frags = [];
  const cw = W / GRID_COLS;
  const ch = H / GRID_ROWS;

  // Image aspect ratio
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const scale = Math.max(W / iw, H / ih);
  const dw = iw * scale, dh = ih * scale;
  const ox = (W - dw) / 2, oy = (H - dh) / 2;

  for (let row = 0; row < GRID_ROWS; row++) {
    for (let col = 0; col < GRID_COLS; col++) {
      const x = col * cw;
      const y = row * ch;
      const cx = x + cw / 2;
      const cy = y + ch / 2;

      // Direction from center
      const dx = cx - W / 2;
      const dy = cy - H / 2;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;

      // Random velocity
      const power = 4 + Math.random() * 8 + dist * 0.015;
      const scatter = 0.6;
      const vx = (dx / dist) * power + (Math.random()-0.5) * power * scatter;
      const vy = (dy / dist) * power + (Math.random()-0.5) * power * scatter;
      const va = (Math.random()-0.5) * 0.25;

      // Stagger: outer pieces leave first
      const stagger = (dist / (Math.max(W,H) * 0.7)) * 0.4;

      frags.push({ x, y, w: cw+1, h: ch+1, cx, cy, vx, vy, va, stagger,
        // Source rect on image
        sx: (x - ox) / scale, sy: (y - oy) / scale,
        sw: cw / scale, sh: ch / scale,
        // Runtime
        px: 0, py: 0, angle: 0, opacity: 1
      });
    }
  }
}

function drawStatic() {
  ctx.clearRect(0,0,W,H);
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const scale = Math.max(W / iw, H / ih);
  const dw = iw * scale, dh = ih * scale;
  const ox = (W - dw) / 2, oy = (H - dh) / 2;
  ctx.drawImage(img, ox, oy, dw, dh);
}

function drawFrag(f, progress) {
  const ease = 1 - Math.pow(1 - Math.max(0, (progress - f.stagger) / (1 - f.stagger)), 2.5);
  f.px = f.vx * ease * EXPLODE_DURATION * 0.055;
  f.py = f.vy * ease * EXPLODE_DURATION * 0.055;
  f.angle = f.va * ease * EXPLODE_DURATION * 0.055;
  f.opacity = Math.max(0, 1 - Math.pow(Math.max(0, (progress - 0.3) / 0.7), 1.5));

  ctx.save();
  ctx.globalAlpha = f.opacity;
  ctx.translate(f.cx + f.px, f.cy + f.py);
  ctx.rotate(f.angle);

  // Clip to fragment shape
  ctx.beginPath();
  ctx.rect(-f.w/2, -f.h/2, f.w, f.h);
  ctx.clip();

  // Draw the image portion
  ctx.drawImage(img,
    Math.max(0, f.sx), Math.max(0, f.sy),
    Math.max(1, f.sw), Math.max(1, f.sh),
    -f.w/2, -f.h/2, f.w, f.h
  );

  // Dark vignette on edge for depth
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(-f.w/2, -f.h/2, f.w, f.h);

  ctx.restore();
}

function animate(now) {
  if (!startTime) startTime = now;
  const elapsed = now - startTime;
  const progress = Math.min(elapsed / EXPLODE_DURATION, 1);

  ctx.clearRect(0,0,W,H);

  frags.forEach(f => drawFrag(f, progress));

  // Reveal Grove behind at 60% progress
  if (progress > 0.5) {
    groveContent.style.opacity = ((progress - 0.5) / 0.5).toString();
  }

  if (progress < 1) {
    requestAnimationFrame(animate);
  } else {
    // Fully done
    overlay.style.display = 'none';
    groveContent.style.opacity = '1';
  }
}

img.onload = function() {
  drawStatic();
  buildFragments();

  // Start explosion after 800ms
  setTimeout(() => {
    animating = true;
    groveContent.style.display = 'block';
    requestAnimationFrame(animate);
  }, 800);
};

img.src = IMG_SRC;
</script>
</body>
